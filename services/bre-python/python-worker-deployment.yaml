# python-worker-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-bre-worker
  namespace: camunda # Deploy in the same namespace
  labels:
    app: python-bre
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-bre
  template:
    metadata:
      labels:
        app: python-bre
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: worker
        image: us-docker.pkg.dev/loansai/my-docker-repo/python-bre:latest # Use the image you pushed
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # Flask port
          protocol: TCP
        env:
        # Worker connects to this internal GKE service address
        - name: ZEEBE_GATEWAY_ADDRESS
          value: "camunda-platform-zeebe-gateway.camunda.svc.cluster.local:26500"
        # Port Flask listens on inside the container
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3